services:
  fastapi:
    image: backtest-fastapi:latest
    ports:
      - "8001:8000"
    env_file:
      - ./fastapi/.env
    restart: unless-stopped

  frontend:
    image: backtest-frontend:latest
    ports:
      - "8082:80"
    depends_on:
      - fastapi
      - spring
    restart: unless-stopped

  spring:
    image: backtest-spring:latest
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/backtest_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=password
    depends_on:
      - mysql
    restart: unless-stopped
