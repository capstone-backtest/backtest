services:
  fastapi:
    build: ./fastapi
    ports:
      - "8001:8000"
    volumes:
      - ./fastapi:/app
    command: sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      - PYTHONPATH=/app
      - APP_VERSION=1.0.0-dev
      - ENVIRONMENT=development
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=mysql+pymysql://root:password@mysql:3306/stock_data_cache?charset=utf8mb4
      - DATABASE_HOST=mysql
      - DATABASE_PORT=3306
      - DATABASE_USER=root
      - DATABASE_PASSWORD=password
      - DATABASE_NAME=stock_data_cache
    env_file:
      - ./fastapi/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    working_dir: /app
    ports:
      - "5174:5174"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - API_PROXY_TARGET=http://fastapi:8000
    depends_on:
      - fastapi
      - redis
      - spring

  spring:
    build:
      context: ./spring
      dockerfile: Dockerfile.dev
    working_dir: /app
    ports:
      - "8080:8080"
    # In dev we bind-mount the spring source so host edits are reflected
    volumes:
      - ./spring:/app
    # Use the repository gradle wrapper in dev to run the app with host sources
    # Run via bash -lc to ensure correct cwd and shell behavior when using the
    # bind-mounted host source (avoids edge cases where $0 or symlink resolution
    # behaves unexpectedly inside the container).
    # Run the wrapper as root in dev to avoid permission issues when the
    # host-mounted files are owned by a different UID. This is acceptable for
    # local development but should NOT be used in production.
    user: root
    command: ["bash", "-lc", "./gradlew bootRun --no-daemon"]
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/backtest_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_PROFILES_ACTIVE=dev
    depends_on:
      - mysql
  
  # 프론트엔드 테스트 실행을 위한 별도 서비스
  frontend-test:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run test:run
    profiles:
      - test

  # 백엔드 테스트 실행을 위한 별도 서비스
  fastapi-test:
    build: ./fastapi
    working_dir: /app
    volumes:
      - ./fastapi:/app
    command: python -m pytest tests/ -v
    environment:
      - PYTHONPATH=/app
    profiles:
      - test
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mysql:
    ports:
      - "3307:3306"
